<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claw 国际象棋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel hero">
      <div>
        <p class="eyebrow">GitHub Pages 演示</p>
        <h1>Claw 国际象棋</h1>
        <p class="subtitle">支持合法走子校验、落子音效、吃子显示、计时器和手机端优化的在线国际象棋。</p>
      </div>
      <div class="hero-actions">
        <button id="newGameBtn" class="primary">新开一局</button>
        <button id="flipBtn">翻转棋盘</button>
      </div>
    </section>

    <section class="layout">
      <div class="board-wrap panel">
        <div class="status-bar">
          <div>
            <span class="label">当前回合</span>
            <strong id="turnLabel">白方</strong>
          </div>
          <div>
            <span class="label">对局状态</span>
            <strong id="stateLabel">进行中</strong>
          </div>
          <div>
            <span class="label">已选棋子</span>
            <strong id="selectedLabel">无</strong>
          </div>
        </div>
        <div id="board" class="board" aria-label="国际象棋棋盘"></div>
      </div>

      <aside class="sidebar">
        <section class="panel player-card">
          <div class="player-row">
            <div>
              <p class="label">白方</p>
              <h2>玩家 1</h2>
            </div>
            <div class="timer" id="whiteTimer">10:00</div>
          </div>
          <div class="captured" id="whiteCaptured">被黑方吃掉：无</div>
        </section>

        <section class="panel player-card dark-card">
          <div class="player-row">
            <div>
              <p class="label">黑方</p>
              <h2>玩家 2</h2>
            </div>
            <div class="timer" id="blackTimer">10:00</div>
          </div>
          <div class="captured" id="blackCaptured">被白方吃掉：无</div>
        </section>

        <section class="panel controls">
          <h3>控制面板</h3>
          <div class="button-grid">
            <button id="undoBtn">悔棋</button>
            <button id="hintBtn">显示可走位置</button>
            <button id="copyFenBtn">复制 FEN</button>
            <button id="resetClockBtn">重置计时</button>
          </div>
          <label class="toggle-row">
            <input type="checkbox" id="legalMovesToggle" checked />
            高亮可走位置
          </label>
          <label class="toggle-row">
            <input type="checkbox" id="soundToggle" checked />
            开启落子声音
          </label>
        </section>

        <section class="panel move-log-panel">
          <div class="panel-header">
            <h3>走子记录</h3>
            <span id="moveCount">0 步</span>
          </div>
          <ol id="moveLog" class="move-log"></ol>
        </section>
      </aside>
    </section>
  </main>

  <script>var exports = {};</script>
  <script src="chess.js"></script>
  <script src="app.js"></script>
</body>
</html>
